<!DOCTYPE html>
<html>
<head>
    <title>LMS Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow" style="width:320px;">
    <h4 class="text-center mb-3">LMS Login</h4>

    <input class="form-control mb-2" type="text" id="username" placeholder="Username">
    <input class="form-control mb-3" type="password" id="password" placeholder="Password">

    <button class="btn btn-primary w-100" onclick="login()">Login</button>
    <button class="btn btn-secondary w-100 mt-2" onclick="goRegister()">Register</button>
</div>

<script>

// 🔥 Auto redirect if already logged in
let user = JSON.parse(localStorage.getItem("user"));
if (user) {
    if (user.role === "ROLE_ADMIN") {
        window.location.href = "admin.html";
    } else {
        window.location.href = "employee.html";
    }
}

function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if (!username || !password) {
        alert("Enter username and password");
        return;
    }

    fetch('http://localhost:8080/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(data => {
        localStorage.setItem("user", JSON.stringify(data));

        if (data.role === "ROLE_ADMIN") {
            window.location.href = "admin.html";
        } else {
            window.location.href = "employee.html";
        }
    })
    .catch(() => alert("Invalid username or password"));
}

function goRegister() {
    window.location.href = "register.html";
}

</script>

</body>
</html>
