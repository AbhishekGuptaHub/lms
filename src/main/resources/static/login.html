<!DOCTYPE html>
<html>
<head>
  <title>LMS Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d6efd">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">

  <style>
    body.bg-dark .card { background:#1e1e1e; color:white; }
    body.bg-dark .form-control { background:#2c2c2c; color:white; border:1px solid #444; }
  </style>
</head>

<body class="bg-light d-flex align-items-center" style="min-height:100vh;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5 col-lg-4">
      <div class="card p-4 shadow">

        <div class="d-flex justify-content-between mb-2">
          <h5>LMS</h5>
          <button class="btn btn-sm btn-outline-dark" onclick="toggleDark()">🌙</button>
        </div>

        <input class="form-control mb-3" id="username" placeholder="Username">
        <input class="form-control mb-3" id="password" type="password" placeholder="Password">

        <button class="btn btn-primary w-100 py-2" onclick="login()">Login</button>
        <button class="btn btn-secondary w-100 mt-2 py-2" onclick="goRegister()">Register</button>

      </div>
    </div>
  </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
if (user && user.username) {
  setTimeout(() => {
    window.location.href = user.role === "ROLE_ADMIN" ? "admin.html" : "employee.html";
  }, 300);
}

function login(){
  fetch(`${location.origin}/api/auth/login`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:username.value,password:password.value})
  })
  .then(r=>r.json())
  .then(d=>{
    localStorage.setItem("user",JSON.stringify(d));
    location.href = d.role==="ROLE_ADMIN"?"admin.html":"employee.html";
  })
  .catch(()=>alert("Invalid login"));
}

function goRegister(){ location.href="register.html"; }

// dark mode
function toggleDark(){
  document.body.classList.toggle("bg-dark");
  document.body.classList.toggle("text-light");
  localStorage.setItem("dark",document.body.classList.contains("bg-dark"));
}
if(localStorage.getItem("dark")==="true"){
  document.body.classList.add("bg-dark","text-light");
}
</script>

</body>
</html>
