<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d6efd">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>

<body class="p-3">

<div class="container">

<div class="d-flex justify-content-between mb-3">
    <h4>Admin</h4>
    <div>
        <span class="badge bg-primary">Welcome <span id="welcome"></span></span>
        <button class="btn btn-danger btn-sm ms-2" onclick="logout()">Logout</button>
    </div>
</div>

<button class="btn btn-primary w-100 mb-3" onclick="loadLeaves()">Load Pending Leaves</button>

<div class="table-responsive">
<table class="table table-bordered">
<thead>
<tr>
<th>ID</th>
<th>User</th>
<th>Type</th>
<th>Days</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
if (!user || user.role !== "ROLE_ADMIN") location.href="login.html";
welcome.innerText=user.username;

function logout(){localStorage.clear();location.href="login.html"}

function loadLeaves(){
fetch(`${location.origin}/api/leaves/pending`)
.then(r=>r.json())
.then(data=>{
table.innerHTML="";
data.forEach(l=>{
table.innerHTML+=`
<tr>
<td>${l.id}</td>
<td>${l.user.username}</td>
<td>${l.leaveType}</td>
<td>${l.totalDays}</td>
<td>
<div class="d-flex flex-column gap-1">
<button class="btn btn-success btn-sm" onclick="review(${l.id},'APPROVED')">Approve</button>
<button class="btn btn-danger btn-sm" onclick="review(${l.id},'REJECTED')">Reject</button>
</div>
</td>
</tr>`;
});
});
}

function review(id,action){
let r=prompt("Remarks");
fetch(`${location.origin}/api/leaves/review/${id}?action=${action}&remarks=${r}`,{method:'POST'})
.then(()=>loadLeaves());
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>

</body>
</html>
