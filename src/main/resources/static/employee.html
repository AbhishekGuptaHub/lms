<!DOCTYPE html>
<html>
<head>
<title>Employee</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="manifest" href="/manifest.json">

<style>
body.bg-dark .card { background:#1e1e1e; color:white; }
body.bg-dark .table { color:white; }
</style>
</head>

<body class="p-3">

<div class="container">

<div class="d-flex justify-content-between mb-3">
<h5>Employee</h5>
<div>
<button class="btn btn-sm btn-outline-dark" onclick="toggleDark()">🌙</button>
<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>
</div>

<div class="card p-3 mb-3">
<select class="form-select mb-2" id="type">
<option value="CASUAL">Casual</option>
<option value="SICK">Sick</option>
<option value="ANNUAL">Annual</option>
</select>

<input class="form-control mb-2" id="start" type="date">
<input class="form-control mb-2" id="end" type="date">
<input class="form-control mb-2" id="reason" placeholder="Reason">

<button class="btn btn-success w-100" onclick="applyLeave()">Apply</button>
</div>

<button class="btn btn-primary w-100 mb-2" onclick="loadHistory()">History</button>

<div class="table-responsive">
<table class="table table-bordered">
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>
let user=JSON.parse(localStorage.getItem("user"));
if (!user || !user.username || user.role !== "ROLE_EMPLOYEE") {
  localStorage.clear();
  window.location.href = "login.html";
}

function logout(){localStorage.clear();location.href="login.html"}

function applyLeave(){
fetch(`${location.origin}/api/leaves/apply`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:user.username,
leaveType:type.value,
startDate:start.value,
endDate:end.value,
reason:reason.value
})
}).then(()=>{alert("Applied");loadHistory();});
}

function loadHistory(){
fetch(`${location.origin}/api/leaves/my?username=${user.username}`)
.then(r=>r.json())
.then(d=>{
table.innerHTML="";
d.forEach(l=>{
table.innerHTML+=`
<tr>
<td>${l.leaveType}</td>
<td>${l.status}</td>
<td>${l.remarks||""}</td>
</tr>`;
});
});
}

// dark
function toggleDark(){
document.body.classList.toggle("bg-dark");
document.body.classList.toggle("text-light");
localStorage.setItem("dark",document.body.classList.contains("bg-dark"));
}
if(localStorage.getItem("dark")==="true"){
document.body.classList.add("bg-dark","text-light");
}
</script>

</body>
</html>
