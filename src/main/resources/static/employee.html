<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>

<body class="p-4">

<div class="d-flex justify-content-between mb-3">
    <h3>Employee Dashboard</h3>
    <div>
        <span id="welcome"></span>
        <button class="btn btn-danger btn-sm ms-2" onclick="logout()">Logout</button>
    </div>
</div>

<div class="card p-3 mb-4">
    <h5>Apply Leave</h5>

    <select class="form-select mb-2" id="type">
        <option value="CASUAL">Casual</option>
        <option value="SICK">Sick</option>
        <option value="ANNUAL">Annual</option>
    </select>

    <input class="form-control mb-2" type="date" id="start">
    <input class="form-control mb-2" type="date" id="end">
    <input class="form-control mb-2" type="text" id="reason" placeholder="Reason">

    <button class="btn btn-success" onclick="applyLeave()">Apply</button>
</div>

<h5>My Leaves</h5>

<button class="btn btn-primary mb-2" onclick="loadHistory()">Load History</button>

<table class="table table-bordered" id="table">
    <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Days</th>
        <th>Status</th>
        <th>Remarks</th>
    </tr>
</table>

<script>

let user = JSON.parse(localStorage.getItem("user"));

// 🔒 Protect employee route
if (!user || user.role !== "ROLE_EMPLOYEE") {
    window.location.href = "login.html";
}

// Show username
document.getElementById("welcome").innerText = "Welcome " + user.username;

// Logout
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

// Apply leave
function applyLeave() {
    fetch(`${window.location.origin}/api/leaves/apply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: user.username,
            leaveType: document.getElementById("type").value,
            startDate: document.getElementById("start").value,
            endDate: document.getElementById("end").value,
            reason: document.getElementById("reason").value
        })
    })
    .then(() => {
        alert("Leave applied");
        loadHistory();
    });
}

// Load history
function loadHistory() {
    fetch(`${window.location.origin}/api/leaves/my?username=${user.username}`)
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById("table");

        table.innerHTML = `
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Days</th>
                <th>Status</th>
                <th>Remarks</th>
            </tr>
        `;

        data.forEach(leave => {
            let row = table.insertRow();

            row.insertCell(0).innerText = leave.id;
            row.insertCell(1).innerText = leave.leaveType;
            row.insertCell(2).innerText = leave.totalDays;
            row.insertCell(3).innerText = leave.status;
            row.insertCell(4).innerText = leave.remarks || "";
        });
    });
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
}

</script>

</body>
</html>
