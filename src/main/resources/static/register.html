<!DOCTYPE html>
<html>
<head>
    <title>LMS Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>

<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh;">

<div class="card p-4 shadow" style="width:320px;">
    <h4 class="text-center mb-3">LMS Registration</h4>

    <input class="form-control mb-2" type="text" id="username" placeholder="Username">
    <input class="form-control mb-2" type="password" id="password" placeholder="Password">
    <input class="form-control mb-2" type="text" id="fullName" placeholder="Full Name">
    <input class="form-control mb-3" type="email" id="email" placeholder="Email">

    <button class="btn btn-success w-100" onclick="register()">Register</button>

    <div class="text-center mt-2">
        <a href="login.html">Already have an account? Login</a>
    </div>
</div>

<script>

function register() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let fullName = document.getElementById("fullName").value;
    let email = document.getElementById("email").value;

    if (!username || !password) {
        alert("Username and password are required");
        return;
    }

    fetch('${window.location.origin}/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: username,
            password: password,
            fullName: fullName,
            email: email
        })
    })
    .then(res => {
        if (!res.ok) throw new Error("Registration failed");
        return res.json();
    })
    .then(() => {
        alert("Registered successfully");

        window.location.href = "login.html";
    })
    .catch(err => {
        alert(err.message);
    });
}

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
}

</script>

</body>
</html>
