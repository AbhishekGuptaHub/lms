<!DOCTYPE html>
<html>
<head>
    <title>LMS Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d6efd">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>

<body class="bg-light d-flex align-items-center" style="min-height:100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-5 col-lg-4">
            <div class="card p-4 shadow">
                <h4 class="text-center mb-3">Register</h4>

                <input class="form-control mb-3" type="text" id="username" placeholder="Username">
                <input class="form-control mb-3" type="password" id="password" placeholder="Password">
                <input class="form-control mb-3" type="text" id="fullName" placeholder="Full Name">
                <input class="form-control mb-3" type="email" id="email" placeholder="Email">

                <button class="btn btn-success w-100 py-2" onclick="register()">Register</button>

                <div class="text-center mt-3">
                    <a href="login.html">Already have account? Login</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function register() {
    fetch(`${window.location.origin}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username: username.value,
            password: password.value,
            fullName: fullName.value,
            email: email.value
        })
    })
    .then(() => {
        alert("Registered");
        window.location.href = "login.html";
    });
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>

</body>
</html>
