<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="d-flex justify-content-between mb-3">
    <h3>Admin Dashboard</h3>
    <div>
        <span id="welcome"></span>
        <button class="btn btn-danger btn-sm ms-2" onclick="logout()">Logout</button>
    </div>
</div>

<button class="btn btn-primary mb-3" onclick="loadLeaves()">Load Pending Leaves</button>

<table class="table table-bordered" id="table">
    <tr>
        <th>ID</th>
        <th>User</th>
        <th>Type</th>
        <th>Days</th>
        <th>Action</th>
    </tr>
</table>

<script>

let user = JSON.parse(localStorage.getItem("user"));

// Protect admin route
if (!user || user.role !== "ROLE_ADMIN") {
    window.location.href = "login.html";
}

// Show username
document.getElementById("welcome").innerText = "Welcome " + user.username;

// Logout
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}

// Load pending leaves
function loadLeaves() {
    fetch('http://localhost:8080/api/leaves/pending')
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById("table");

        table.innerHTML = `
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Type</th>
                <th>Days</th>
                <th>Action</th>
            </tr>
        `;

        data.forEach(leave => {
            let row = table.insertRow();

            row.insertCell(0).innerText = leave.id;
            row.insertCell(1).innerText = leave.user.username;
            row.insertCell(2).innerText = leave.leaveType;
            row.insertCell(3).innerText = leave.totalDays;

            let actionCell = row.insertCell(4);

            actionCell.innerHTML = `
                <button class="btn btn-success btn-sm" onclick="review(${leave.id}, 'APPROVED')">Approve</button>
                <button class="btn btn-danger btn-sm" onclick="review(${leave.id}, 'REJECTED')">Reject</button>
            `;
        });
    });
}

// Approve / Reject
function review(id, action) {
    let remarks = prompt("Enter remarks:");

    fetch(`http://localhost:8080/api/leaves/review/${id}?action=${action}&remarks=${remarks}`, {
        method: 'POST'
    })
    .then(() => {
        alert("Updated");
        loadLeaves();
    });
}

</script>

</body>
</html>
